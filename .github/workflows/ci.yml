name: HDFS Rack Placer CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run unit tests with coverage
      run: |
        python -m pytest tests/ -v --tb=short \
          --cov=src \
          --cov-report=term-missing \
          --cov-report=xml

    - name: Upload coverage report
      uses: codecov/codecov-action@v4
      with:
        file: coverage.xml
      continue-on-error: true

    - name: Smoke test CLI
      run: |
        cd $GITHUB_WORKSPACE
        # Reset state
        python3 src/rack_placer.py reset || true
        # Create a temp file and upload
        echo "Hackathon smoke test data" > /tmp/smoke.txt
        python3 src/rack_placer.py upload /tmp/smoke.txt --replication 2
        # Show status
        python3 src/rack_placer.py status
        # Simulate rack failure
        python3 src/rack_placer.py kill-rack 1
        # Final status
        python3 src/rack_placer.py status
        echo "✓ Smoke test passed"
