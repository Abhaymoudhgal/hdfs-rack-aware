      - r1n3_data:/tmp/hadoop-root/dfs/data
      - ./config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro

    networks:
      rack1_net:
        ipv4_address: 172.20.1.13
      hdfs_mgmt:

    depends_on:
      - namenode

  datanode_r2n1:
    image: apache/hadoop:3
    container_name: hdfs_r2n1
    hostname: rack2node1
    user: root

    command: >
      sh -c "
